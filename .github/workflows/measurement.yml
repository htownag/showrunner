# The framework repo's FIRST compiled gate: the measurement spec's rulings (R1-R6)
# graduate from prose into an executable check that fails the PR if ledger.py drifts.
name: measurement

on:
  push:
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the golden-fixture conformance suite
        run: python3 -m unittest discover -s measurement/tests -t .

      - name: Validate the bundled example ledger (compiled gate, ruling R1)
        run: python3 measurement/ledger.py check --ledger measurement/example-ledger.jsonl
